name: Commit Message Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 检查 commit 消息
      id: check_commit
      shell: pwsh
      run: |
        # 获取最新的 commit 消息
        $commitMessage = git log -1 --pretty=%B
        Write-Host "Commit 消息: $commitMessage"
        
        # 检查是否包含版本号格式 (如 "Release v3.2" 或 "v3.2")
        if ($commitMessage -match 'v([\d.]+)') {
          $version = $matches[1]
          Write-Output "should_release=true" >> $env:GITHUB_OUTPUT
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "✓ 检测到版本号: v$version" -ForegroundColor Green
        } else {
          Write-Output "should_release=false" >> $env:GITHUB_OUTPUT
          Write-Host "⊘ 未检测到版本号，跳过发布" -ForegroundColor Yellow
        }
    
    - name: 提取 Release 描述
      if: steps.check_commit.outputs.should_release == 'true'
      id: extract
      shell: pwsh
      run: |
        $version = "${{ steps.check_commit.outputs.version }}"
        
        # 检查当前工作目录
        Write-Host "当前工作目录: $(Get-Location)"
        Write-Host "文件列表:"
        Get-ChildItem -Name | ForEach-Object { Write-Host "  $_" }
        
        # 检查 RELEASE_NOTES.md 是否存在
        if (Test-Path "RELEASE_NOTES.md") {
          Write-Host "✓ 找到 RELEASE_NOTES.md 文件"
          
          # 尝试读取文件，使用多种编码方式
          try {
            $content = Get-Content -Path "RELEASE_NOTES.md" -Raw -Encoding UTF8
            Write-Host "✓ 使用 UTF8 编码成功读取文件"
          } catch {
            Write-Host "UTF8 读取失败，尝试默认编码..."
            try {
              $content = Get-Content -Path "RELEASE_NOTES.md" -Raw
              Write-Host "✓ 使用默认编码成功读取文件"
            } catch {
              Write-Host "⚠️ 无法读取 RELEASE_NOTES.md 文件: $($_.Exception.Message)"
              $content = $null
            }
          }
          
          # 提取对应版本的描述
          if ($content) {
            $pattern = "(?s)(##\s+v$version.*?)(?=##\s+v[\d.]+|$)"
            if ($content -match $pattern) {
              $description = $matches[1].Trim()
              $description | Out-File -FilePath "release_body.md" -Encoding UTF8
              Write-Host "✓ 已提取版本 v$version 的描述"
            } else {
              # 如果找不到对应版本，使用 commit 消息
              $commitMessage = git log -1 --pretty=%B
              $commitMessage | Out-File -FilePath "release_body.md" -Encoding UTF8
              Write-Host "⚠️ 未找到版本描述，使用 commit 消息"
            }
          } else {
            # 如果读取失败，使用 commit 消息
            $commitMessage = git log -1 --pretty=%B
            $commitMessage | Out-File -FilePath "release_body.md" -Encoding UTF8
            Write-Host "⚠️ 文件读取失败，使用 commit 消息"
          }
        } else {
          # 如果没有 RELEASE_NOTES.md，使用 commit 消息
          $commitMessage = git log -1 --pretty=%B
          $commitMessage | Out-File -FilePath "release_body.md" -Encoding UTF8
          Write-Host "⚠️ RELEASE_NOTES.md 不存在，使用 commit 消息"
        }
    
    - name: 检查标签是否已存在
      if: steps.check_commit.outputs.should_release == 'true'
      id: check_tag
      shell: pwsh
      run: |
        $version = "${{ steps.check_commit.outputs.version }}"
        $tagExists = git tag -l "v$version"
        
        if ($tagExists) {
          Write-Output "exists=true" >> $env:GITHUB_OUTPUT
          Write-Host "⚠️ 标签 v$version 已存在，跳过发布"
        } else {
          Write-Output "exists=false" >> $env:GITHUB_OUTPUT
          Write-Host "✓ 标签 v$version 不存在，可以创建"
        }
    
    - name: 设置 Python 环境
      if: steps.check_commit.outputs.should_release == 'true' && steps.check_tag.outputs.exists == 'false'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      if: steps.check_commit.outputs.should_release == 'true' && steps.check_tag.outputs.exists == 'false'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 构建可执行文件
      if: steps.check_commit.outputs.should_release == 'true' && steps.check_tag.outputs.exists == 'false'
      run: |
        pyinstaller --name=TODO待办事项 --onefile --windowed --icon=app_icon.ico --clean todo_app.py
    
    - name: 重命名可执行文件
      if: steps.check_commit.outputs.should_release == 'true' && steps.check_tag.outputs.exists == 'false'
      shell: pwsh
      run: |
        $version = "${{ steps.check_commit.outputs.version }}"
        Move-Item -Path "dist/TODO待办事项.exe" -Destination "dist/TODO待办事项-v$version.exe"
    
    - name: 创建 Release
      if: steps.check_commit.outputs.should_release == 'true' && steps.check_tag.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.check_commit.outputs.version }}
        name: v${{ steps.check_commit.outputs.version }}
        body_path: release_body.md
        files: dist/TODO待办事项-*.exe
        draft: false
        prerelease: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 发布成功
      if: steps.check_commit.outputs.should_release == 'true' && steps.check_tag.outputs.exists == 'false'
      run: |
        echo "✓ 发布成功！版本: v${{ steps.check_commit.outputs.version }}"
    
    - name: 跳过发布
      if: steps.check_commit.outputs.should_release == 'false'
      run: |
        echo "⊘ Commit 消息中未检测到版本号，跳过发布"
