name: Multi-Platform Build

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: TODO待办事项-Windows
            asset_name: TODO待办事项-Windows.exe
          - os: ubuntu-latest
            artifact_name: TODO待办事项-Linux
            asset_name: TODO待办事项-Linux
          - os: macos-latest
            artifact_name: TODO待办事项-macOS
            asset_name: TODO待办事项-macOS.app
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装系统依赖 (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0 libxkbcommon-x11-0
    
    - name: 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 构建可执行文件 (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --name=TODO待办事项 --onefile --windowed --icon=app_icon.ico --clean todo_app.py
    
    - name: 构建可执行文件 (Linux)
      if: runner.os == 'Linux'
      run: |
        pyinstaller --name=TODO待办事项 --onefile --windowed --icon=app_icon.png --clean todo_app.py
    
    - name: 构建可执行文件 (macOS)
      if: runner.os == 'macOS'
      run: |
        pyinstaller --name=TODO待办事项 --onefile --windowed --icon=app_icon.png --clean todo_app.py
    
    - name: 重命名构建产物
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          mv "dist/TODO待办事项.exe" "dist/${{ matrix.asset_name }}"
        elif [ "${{ runner.os }}" == "macOS" ]; then
          mv "dist/TODO待办事项.app" "dist/${{ matrix.asset_name }}" || mv "dist/TODO待办事项" "dist/${{ matrix.asset_name }}"
        else
          mv "dist/TODO待办事项" "dist/${{ matrix.asset_name }}"
        fi
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.asset_name }}
    
    - name: 创建 Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/${{ matrix.asset_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
