name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v 开头的标签时触发，例如 v3.2, v3.2.1
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 构建可执行文件
      run: |
        pyinstaller --name=TODO待办事项 --onefile --windowed --icon=app_icon.ico --clean todo_app.py
    
    - name: 重命名可执行文件（添加版本号）
      run: |
        $version = "${{ github.ref_name }}"
        $version = $version -replace '^v', ''
        Move-Item -Path "dist/TODO待办事项.exe" -Destination "dist/TODO待办事项-v${version}.exe"
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable
        path: dist/TODO待办事项-*.exe
    
    - name: 创建 Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/TODO待办事项-*.exe
        draft: false
        prerelease: false
        body_path: RELEASE_NOTES.md
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
